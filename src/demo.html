r tracks manufacturer incentive programs. This is completely unique to Canvass."}},{id:"activephase",phase:"Core",icon:"◎",name:"Active Phase Workflow",desc:"Post-sale active client workflow: Design Review → Balance Due → Exchange → GoldComp → Issue → Done. Each phase has its own notes, dates, and result (Done removes from active queue, Postpone keeps it visible).",benefit:"Replaces the 3-spreadsheet active client chaos with a single, structured workflow.",vs:{HoneyBook:"Has project stages but not mapped to furnishing-specific phases",Mydoma:"Has project management but not sales-cycle active phase tracking",ALL:"No competitor has a post-sale active phase system tied to delivery workflow"}},{id:"timeline",phase:"Core",icon:"◷",name:"Client Lifetime Timeline",desc:"Every event auto-recorded into the client timeline: sale made, delivery scheduled, issue opened, phase changed, signature captured, email sent. Searchable by name, email, phone, or customer number.",benefit:"Every conversation with every client — documented automatically, forever.",vs:{HoneyBook:"Has activity log but not auto-populated from field changes",Mydoma:"Has client notes but no unified searchable timeline","Studio Designer":"Has detailed records but requires manual entry for most events"}},{id:"mileage",phase:"Core",icon:"🚗",name:"Mileage Auto-Sync from Home Calls",desc:"When a designer marks a home call as completed, the client address auto-populates a mileage log entry. IRS-compliant rate ($0.725/mi). Full log with dates, clients, distances. Excel export for tax prep.",benefit:"Saves 2–5 hours/year at tax time. Average deduction: $400–$800/year.",vs:{ALL:"No competitor tracks mileage, home calls, or auto-syncs travel records. Completely unique."}},{id:"fiscal",phase:"Core",icon:"📅",name:"EA Fiscal Year (Q1=July)",desc:"Full fiscal year support for EA and similar brands where Q1 starts in July. All analytics, goal tracking, and year summaries respect the custom fiscal year. Annual goal tracker with month-by-month breakdown.",benefit:"Reports finally match reality for EA designers. No more manual fiscal year math.",vs:{ALL:"All competitors use January fiscal year. Canvass is configurable."}},{id:"tests",phase:"Core",icon:"🧪",name:"125 Automated Business Logic Tests",desc:"Full test suite covering every business rule, calculation, and edge case. Runs in the browser with pass/fail output. Ensures GoldComp math, urgency scores, post-30/60 dates, fiscal year calculations are always correct.",benefit:"Trust your data. Every formula is tested. No silent bugs in commission or GoldComp math.",vs:{ALL:"No consumer CRM ships with a visible, runnable test suite for business logic."}},{id:"sms",phase:"Phase 1",icon:"💬",name:"SMS/WhatsApp Message Templates",desc:"Tier-aware message templates auto-generated per client. HOT tier gets urgency templates, WARM gets nurture templates, SOLD gets delivery confirmation. One-click copy to iMessage or WhatsApp.",benefit:"Ready-to-send messages for any client in any stage — in seconds, not minutes.",vs:{HoneyBook:"Has email templates only — no SMS/WhatsApp integration",Dubsado:"Has email sequences but no texting",ALL:"No competitor has interior design-specific SMS templates tied to win tier"}},{id:"photos",phase:"Phase 1",icon:"📷",name:"Room Photo Uploads",desc:"Upload before/after photos and inspiration images directly to each opportunity. Stored per room with labels. Auto-compressed for storage efficiency. Visible in client portal. Up to 5 photos per project.",benefit:"All client visuals in one place — no more separate Dropbox folders or texted photos.",vs:{Mydoma:"Has mood boards and project images — but not tied to the sales pipeline","Houzz Pro":"Has photo management — but not linked to individual sales opportunities"}},{id:"commission",phase:"Phase 1",icon:"💰",name:"Commission Calculator",desc:"Set your commission rate (configurable %). See monthly and YTD earnings, top deals ranked by value, and annual projection. Separate tab in the nav. Per-designer tracking in Studio tier.",benefit:"Finally know what you've earned this month without an Excel formula.",vs:{ALL:"No competitor has a built-in commission calculator tied to closed sales. Completely unique."}},{id:"quotepdf",phase:"Phase 1",icon:"📄",name:"Quote PDF Generator",desc:"Generate a branded, print-ready PDF proposal from any opportunity. Client name, project type, estimate, GoldComp credit, delivery timeline, designer signature line. Opens in browser for print or PDF save.",benefit:"Polished quotes in 10 seconds. No Word template, no copy-paste.",vs:{HoneyBook:"Has proposal builder but not furnishing-specific","Houzz Pro":"Has quote generation — one of the features we absorb",Mydoma:"Has proposals but more design-focused than sales-focused"}},{id:"emailseq",phase:"Phase 1",icon:"📧",name:"Automated Email Sequences",desc:"Pre-written Day 1/3/7 follow-up sequences per win tier. Start the sequence with one click — it tracks which emails were sent, marks completion, and shows scheduled dates. Copy-to-clipboard for each email.",benefit:"Never lose track of where you are in a follow-up sequence.",vs:{HoneyBook:"Has email automation but not tied to furnishing win tiers",Dubsado:"Has sequences but generic — not industry-native"}},{id:"intake",phase:"Phase 1",icon:"📋",name:"Client Intake Form",desc:"Digital questionnaire to fill with clients before or during a home call. Style preferences, budget range, timeline, project type, inspiration notes. Saves directly as a new pipeline lead. Printable as PDF.",benefit:"Client's information goes from home call directly into your pipeline — zero re-entry.",vs:{Mydoma:"Has onboarding questionnaire — one of the features we absorb",Dubsado:"Has intake forms — one of the features we absorb",HoneyBook:"Has lead forms — one of the features we absorb"}},{id:"expense",phase:"Phase 1",icon:"🧾",name:"Expense Tracker",desc:"Log project-related expenses (samples, travel, materials) per opportunity. Calculates net margin automatically. Export to Excel for tax prep or accounting.",benefit:"See the real profit on every deal — not just gross revenue.",vs:{"Houzz Pro":"Has expense tracking — one of the features we absorb",Bonsai:"Has expense tracking — one of the features we absorb"}},{id:"review",phase:"Phase 1",icon:"⭐",name:"Review Request Automation",desc:"At Post-60 closure, auto-drafts a Google and Houzz review request tailored to the client and project. Track who has been asked and who has responded. One-click copy.",benefit:"Turn satisfied clients into public advocates — automatically.",vs:{"Houzz Pro":"Has review management — one of the features we absorb"}},{id:"portal",phase:"Phase 2",icon:"🏠",name:"Client Portal",desc:"Generate a shareable link for each client. They see their delivery status, active phase, upcoming dates, photos, and project timeline — all mobile-friendly. No login required for the client.",benefit:"Clients stop calling to ask 'where's my furniture?' — they check the portal instead.",vs:{HoneyBook:"Has client portal — one of the features we absorb",Mydoma:"Has client portal — one of the features we absorb","Canvass advantage":"Ours is tied to post-sale lifecycle + photos + e-signature. Theirs stops at invoices."}},{id:"multibrand",phase:"Phase 2",icon:"🏢",name:"Multi-Brand Workspace",desc:"Connect multiple Supabase databases (brands) and switch between them from the nav. Each brand has its own pipeline, goals, commission rates, and fiscal year. One designer can work for multiple employers.",benefit:"The only CRM where a designer can manage EA, Mitchell Gold, and RH in one tool.",vs:{ALL:"No competitor supports working across multiple employer brands. Completely unique."}},{id:"esig",phase:"Phase 2",icon:"✍️",name:"E-Signatures",desc:"Canvas-based signature pad in a modal. Send sale confirmations or delivery authorizations for e-signature. Client signs on their phone. Signature saved to client timeline with date and document label.",benefit:"Make the  — pilot for [Company]?",body:"Hi [First Name],\n\nI'm Bernardo Medrado, founder of Canvass — a CRM built specifically for interior design and home furnishings sales reps.\n\nWe built Canvass from real workflows used by Ethan Allen designers — GoldComp tracking, post-delivery follow-ups, home call mileage, active phase management. Everything Salesforce can't do without months of configuration.\n\nWe're exploring white-label partnerships with brands that have design networks. The ask: a 10-designer, 90-day pilot. No IT installation. No procurement process. Just real adoption data you can take to your CFO.\n\nWould a 15-minute call this week make sense?\n\nBernardo Medrado\nFounder, Canvass · canvasscrm.com"},{day:14,ch:"Email",subject:"RE: CRM for [Company] design team — quick question",body:"Hi [First Name],\n\nOne question before I leave you alone:\n\nWhat percentage of your design consultants are actively logging their pipeline, home calls, and post-delivery follow-ups in your current system?\n\nIf it's under 70%, that's the gap we fix. Happy to show you exactly how in 10 minutes.\n\nBernardo"},{day:21,ch:"LinkedIn",subject:"",body:"[First Name], no pressure at all if timing isn't right. We'll be around when it is. If you ever want to see how Canvass is performing for a regional Ethan Allen team, just say the word."}]},"ASID Chapter":{persona:"Chapter President / Board Member",steps:[{day:1,ch:"LinkedIn",subject:"",body:"[First Name], congratulations on leading the [Chapter] ASID chapter. I've been building a CRM specifically for interior designers and I'd love your perspective as a chapter leader. Would you be open to a quick conversation?"},{day:4,ch:"Email",subject:"CRM built for interior designers — demo for your chapter?",body:"Hi [First Name],\n\nI'm reaching out because I built Canvass, a CRM designed specifically for interior designers. Unlike HoneyBook or Dubsado, it handles: post-delivery follow-ups, mileage tracking from home visits, GoldComp incentive programs, and client lifecycle management.\n\nI'd love to offer your chapter members a free 30-day trial + a live demo at your next meeting. No sponsorship fee — just a chance to show your members a tool built for them.\n\nBernardo Medrado · canvasscrm.com"},{day:10,ch:"Email",subject:"RE: Canvass — free demo for [Chapter] ASID",body:"Hi [First Name],\n\nJust circling back. I know chapter presidents are incredibly busy, so I'll keep this short:\n\n→ Free 30-day trial for all chapter members\n→ 20-minute live demo at your next meeting\n→ No cost, no obligation\n\nThe [Arizona North / Ohio North] chapter found this deeply resonant with their members. Happy to share that story.\n\nBernardo"},{day:21,ch:"LinkedIn",subject:"",body:"[First Name], no worries if timing isn't right for the chapter. Canvass will be here whenever your members are ready. Would love to stay connected."}]},"Studio Owner":{persona:"Studio Owner / Principal Designer",steps:[{day:1,ch:"LinkedIn",subject:"",body:"[First Name], I came across [Studio Name] while researching the design industry — your work on [project type] is exactly the aesthetic I love. What does your current client tracking system look like?"},{day:4,ch:"Email",subject:"Are you still tracking clients in Excel?",body:"Hi [First Name],\n\nI built Canvass after watching my wife — an interior designer — manage clients across three spreadsheets, a legal pad for mileage, and sticky notes for follow-ups.\n\nCanvass is a CRM built for how designers work: from the first home call to post-delivery check-ins. Takes 5 minutes to set up.\n\nWould you want to try it free for 14 days? I'd genuinely love feedback from a designer at your level.\n\nBernardo Medrado · canvasscrm.com"},{day:10,ch:"Email",subject:"RE: Canvass — one question",body:"Hi [First Name],\n\nIn the past 90 days, how many of your delivered clients have you followed up with at the 30-day and 60-day mark?\n\nIf it's less than 80%, Canvass automates that gap entirely. The average designer recovers $3k–$8k/year in follow-up conversations they previously forgot to have.\n\nHappy to show you in 10 minutes.\n\nBernardo"},{day:21,ch:"LinkedIn",subject:"",body:"[First Name], no pressure — just wanted to leave this here in case timing becomes right. Canvass is free to try for 14 days. canvasscrm.com"}]},"IT Director":{persona:"VP IT / CTO / Head of Technology",steps:[{day:1,ch:"LinkedIn",subject:"",body:"[First Name], I'm building a CRM for interior design and furnishing sales teams. Your tech stack at [Company] came up in my research. I'd love to understand how you're enabling your design consultant teams today."},{day:5,ch:"Email",subject:"Zero-IT deployment CRM for interior design teams at [Company]",body:"Hi [First Name],\n\nI'm Bernardo Medrado, founder of Canvass — a CRM for furnishing and interior design sales reps.\n\nOur enterprise pilot model is designed to minimize IT burden: Canvass is a single HTML file + Supabase database. No installation. No server maintenance.\n\nPilot model:\n→ Day 1: Designers open app in browser. Done.\n→ Day 7: First pipeline report visible to management\n→ Day 30: Adoption data vs. current tool\n\nSecurity: Data lives in your own Supabase instance. You own it.\n\nWould a technical overview call make sense?\n\nBernardo"},{day:12,ch:"Email",subject:"RE: Canvass tech — quick follow-up",body:"Hi [First Name],\n\n→ Security: Data in your own Supabase instance (you own it)\n→ Adoption: 82% in Week 2 vs. 38% for Salesforce in this use case\n→ Cost: $39/seat vs. $150+ for Salesforce\n\nHappy to send a 2-page technical overview if useful.\n\nBernardo"},{day:21,ch:"LinkedIn",subject:"",body:"[First Name], technical overview (security model, data architecture, API access) is available at canvasscrm.com/enterprise. Here whenever the timing is right."}]}};function B(){let[e,t]=(0,l.useState)("Enterprise Brand"),[n,r]=(0,l.useState)(""),[i,a]=(0,l.useState)(""),[s,u]=(0,l.useState)(null),c=$[e],g=s||c.steps.map(e=>({...e})),v
